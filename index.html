<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人網站</title>
    <link rel="stylesheet" href="CSS/all.min.css">
    <style>
        :root {
            /* 品牌色 */
            --pet-primary: #D6DDE1;
            /* 霧藍灰 */
            --pet-secondary: #D8D5CE;
            /* 淺燕麥灰 */

            /* 背景色 */
            --bg-primary: #FDFCFB;
            /* 暖白 */
            --bg-secondary: #F7F6F4;
            /* 奶霧白 */
            --bg-card: #FFFFFF;

            /* 文字色 */
            --text-primary: #787E83;
            /* 柔灰 */
            --text-secondary: #A5ABB0;
            /* 淺灰 */
            --text-light: #FFFFFF;

            /* 邊框色 */
            --border-primary: #E7E9EA;
            --border-secondary: #F1F2F3;

            /* 強調色 */
            --paw-accent: #E8DDD6;
            /* 肉球奶霜色 */
            --sky-accent: #DCE4E8;
            /* 晴空霧藍 */
            --leaf-accent: #DCE4DE;
            /* 霧草綠 */
        }

        body {
            background-color: var(--pet-primary);
        }

        .s01 {
            background-color: var(--sky-accent);
            height: 100vh;
            position: relative;
        }

        .s01 .box01 {
            width: 200px;
            height: 200px;
            background-color: var(--bg-primary);
            position: absolute;
            top: 0;
            left: 0;
        }

        .s01 .box02 {
            width: 200px;
            height: 200px;
            background-color: var(--bg-primary);
            position: absolute;
            top: 0;
            right: 0;
        }

        .s01 .box03 {
            width: 200px;
            height: 200px;
            background-color: var(--bg-primary);
            position: absolute;
            left: 0;
            bottom: 0;
        }

        .s01 .box04 {
            width: 200px;
            height: 200px;
            background-color: var(--bg-primary);
            position: absolute;
            bottom: 0;
            right: 0;
        }

        .s01 .userimg {
            position: absolute;
            top: 100px;
            left: 100px;
            bottom: 100px;
            right: 100px;
            background-color: var(--leaf-accent);
            background-image: url(images/dog01.avif);
            background-position: center center;
            background-size: cover;
            border-radius: 15px;
            box-shadow: #000;
        }

        .usertext {
            color: var(--sky-accent);
            position: absolute;
            top: 60%;
            left: 10%;
            right: 30%;
        }

        /*S02作品區*/
        .S02 {
            padding: 80PX 10%;
            background-color: var(--leaf-accent);
            text-align: center;
        }

        .s02 h2 {
            font-size: 36px;
        }

        .s02 .card {
            width: 240px;
            background-color: var(--paw-accent);

        }
    </style>
</head>

<body>
    <section class="s01">
        <div class="box01"></div>
        <div class="box02"></div>
        <div class="box03"></div>
        <div class="box04"></div>
        <div class="userimg"></div>
        <div class="usertext">
            <h1>我的履歷</h1>
            <hr>
            <h2>應徵職位</h2>
            <p>zzzzzzzzzzzzzzz</p>
        </div>
    </section>

    <section class="s02">
